<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS media Queries</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        :root{
            --defradius: 10px;
            --color: yellow;
            --seccolor: green;
            --defmargin: 10px;
            --defpad: 10px;
        }
        body{
            background-color: blueviolet;
            color: aliceblue
        }
        @media screen and (max-width: 400px) {
            body{
                background-color: blue;
            }
            .boxes{
                flex-direction: column;
            }
        }
        @media screen and (min-width: 600px) {
            body{
                background-color: rebeccapurple;
            }
        }
        @media screen and (orientation: landscape){
            body{
                border: 10px solid yellow;
            }
            .portrait{
                display: none;
            }
        }
        @media screen and (orientation: portrait){
            body{
                border: 10px solid green;
            }
            .landscape{
                display: none;
            }
        }
        .boxes{
            display: flex;
        }
        .box{
            max-width: 200px;
            margin: var(--defmargin);
            padding: var(--defpad);
            border: 5px double green;
            border-radius: var(--defradius);
            box-sizing: border-box;
            outline: 3px solid yellow;
            background-color: steelblue;
            font-weight: bolder;
            font-size: 50px;
            font-family: cursive,system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            color: #666;
            text-shadow: 1px 1px 5px white;
        }
    </style>
</head>
<body>
    <h1 class="portrait">You are in portrait</h1>
    <h1 class="landscape">You are in Landscape</h1>
    <div>I am a blueviolet body</div>
    <div class="boxes">
        <div class="box">Box</div>
        <div class="box">Box</div>
        <div class="box">Box</div>
        <div class="box">Box</div>
    </div>
</body>
</html>
