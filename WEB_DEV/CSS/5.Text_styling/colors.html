<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colors</title>
    <style>
        * {
            background-color: burlywood;
        }
        p{
            color: #4bda00;
            background-color: tomato;
        }
        h1 {
            color: darkred;
            background-color: aquamarine;
        }

        main {
            color: #4bda00;
            background-color: burlywood;
        }

        li {
            color: rgb(0, 59, 252);
            background-color: lightseagreen;
        }

        .one {
            color: rgba(234, 19, 241, 0.726);
            background-color: lightcoral;
        }

        .two {
            color: hsla(209, 90%, 47%, 0.685);
            background-color: plum;
        }

        .three {
            color: hsl(300, 80%, 42%);
            background-color: lightsteelblue;
        }

        .four {
            color: darkorange;
            background-color: lightskyblue;
        }
    </style>
</head>

<body>
    <header>
        <h1>Lets learn about Colors</h1>
    </header>
    <main>
        <p>Colors can be represented in :-</p>
        <ol>
            <li class="one">color keywords(e.g: aqua,red,maron,grey)</li>
            <li class="two">Hex-color Code</li>
            <li class="three">RGB</li>
            <li class="four">RGBA</li>
            <li class="five">HSL</li>
        </ol>
    </main>
</body>

</html>
