    <title>Specificity of CSS</title>
    <style>
        /* the specificity of this is 0 */
        * {
            color: aqua;
        }

        /* the specificity of this is 10 */
        .yellow {
            color: yellow;
        }

        .cpurple {

        /* the specificity of this is 1 */
        h1 {

        }

        /* the specificity of this is 10 */
        [data-x="Aha"] {
            color: brown;
        }

        /* the specificity of this is 10 */
        [data-x=A] {
            background-color: aquamarine;
        }

        /* the specificity of this is 1 */
        .h3 {
            color: magenta !important;
        }
        
        /* the specificity of this is 1+10=11 */
        h1.yellow{
            color: yellow;
        }
        h1.yellow:hover{
            color: limegreen;
        }
        
        /* the specificity of this is 1+10=11 */
        a.harryclass.rohanclass[href]:hover{
            color: lime;
        }
        
        </style>
