<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model of CSS</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            background-color: aqua;

        }
        .box1{
            color: yellow;
            padding: 10px;
            margin: 50px;
            border: 5px solid black;
            height: 120px;
            width: 120px;
            box-sizing: border-box;

        }
        .box2{
            color: red;
            padding: 10px;
            margin: 50px;
            border: 5px solid blue;
            height: 120px;
            width: 120px;
            box-sizing: border-box;
        }
        .box3{
            color: blue;
            padding: 10px;
            border: 10px solid red;
            margin: 10px;
            height: 300px;
            width: 300px;
            box-sizing: border-box;
            display: inline-block;
        }

    </style>
</head>
<body>
    <div class="box box1">I am a box</div>
    <div class="box box2">I am another box</div>
        <span class="box3">Just BOX</span>
</body>
</html>
