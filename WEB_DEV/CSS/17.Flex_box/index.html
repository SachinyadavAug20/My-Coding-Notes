<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS FlexBox</title>
    <style>
        .container{
            border: 2px solid red;
            display: flex;
            height: 80vh;
            /* justify-content: center; */
            align-items: center;
            /* flex-direction: column; */
            /* flex-direction: column-reverse; */
            flex-direction: row;
            /* flex-direction: row-reverse; */
            flex-wrap: wrap;
            align-content: center;
            /* there is no jsutify-items  */
            /* flex-wrap: wrap-reverse; */
            flex-flow: row wrap;
            /* gap: 6px; */
            /* row-gap: 5px; */
            /* column-gap: 1px; */
            gap: 6px 2px;
        }
        .item{
            height: 62px;
            width: 62px;
            background-color: blueviolet;
            border: 1px solid grey;
            /* margin: 4px; */
            font-size: 20px;
            font-family: cursive,system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            text-align: center;
            color: aliceblue;
            text-shadow: 2px 2px 2px black;
        }
        .order1{
            order: 1;
        }
        .order2{
            order: 2;
        }
        .order3{
            order: 3;
        }
        .order4{
            order: 4;
        }

        .container1{
            margin: 4px;
            padding: 2px;
            border: 2px double blue;
            display: flex;
            min-height: 65vh;
            gap: 2px 5px;
            align-items: center;
            justify-content: center;
        }
       .container1 .item{
        background-color: darkcyan;
        border: 2px solid darkgray;
        border-radius: 8.56px;
        flex-grow: 1;/*will take equal space in width all items*/
        }
        .container1 .item:nth-child(3){
            flex-grow: 10;
        }
        .container1 .item:nth-child(5){
            flex-shrink: 10;/*ability to shrink if necessary*/
            align-self: flex-start;
        }
        .container1 .item:nth-child(7){
            align-self: center;
            align-self: flex-end;
        }
    </style>
</head>
<body>
    <div class="container1">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>
        <div class="item">6</div>
        <div class="item">7</div>
    </div>
    <div class="container">
        <div class="item order1">1</div>
        <div class="item order2">2</div>
        <div class="item order3">3</div>
        <div class="item">4</div>
        <div class="item">5</div>
        <div class="item">6</div>
        <div class="item order4">7</div>
        <div class="item">8</div>
        <div class="item">9</div>
        <div class="item">10</div>
        <div class="item">11</div>
        <div class="item">12</div>
        <div class="item order2">13</div>
        <div class="item">14</div>
        <div class="item">15</div>
        <div class="item">16</div>
        <div class="item order1">17</div>
        <div class="item">18</div>
        <div class="item">19</div>
        <div class="item">20</div>
        <div class="item order1">21</div>
        <div class="item">22</div>
        <div class="item">23</div>
        <div class="item order1">24</div>
        <div class="item">25</div>
        <div class="item">26</div>
        <div class="item">27</div>
        <div class="item">28</div>
        <div class="item">29</div>
        <div class="item">30</div>
    </div>
</body>
</html>
