<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Animations</title>
    <style>
        .container{
            width: 75vw;
            margin: auto;
            padding: 5px;
            height: 60vh;
            border: 2px solid gray;
            border-radius: 10px;
            background-color: wheat;
        }
        .box{
            margin: 40px;
            padding: 10px;
            background-color: aqua;
            border: 2px solid rgb(190, 252, 252);
            border-radius: inherit;
            width: 5vw;
            height: 5vh;
            /* animation: movement;
            animation-duration: 3s;
            animation-iteration-count: 3;
            animation-iteration-count: infinite;
            animation-timing-function: cubic-bezier(0, 0, 0, 0.97);;
            animation-delay: 2s;
            animation-direction: alternate-reverse; */
            /* OR */
            /* animation: name duration timing-function delay iteration-count direction fill-mode; */
            animation: movement 3s cubic-bezier(0, 0, 0, 0.96) 2s 1 alternate forwards,
                        rotation 5s cubic-bezier(0, 0, 0, 0.96) 1s 1 alternate forwards;
        }
        @keyframes movement{
            from{
                background-color: red;
                font-size: 16px;
                color: white;
            }
            to{
                color: black;
                font-size: 17px;
                background-color: yellow;
                transform: translateX(20vw); 
            }
        }
        @keyframes rotation{
            0%{
                transform: rotate(15deg);
            }
            25%{
                transform: rotate(25deg);
                background-color: aqua;
            }
            50%{
                transform: rotate(35deg);
                font-weight: bolder;
            }
            75%{
                transform: rotate(45deg);
                transform: scale(2);
            }
            100%{
                transform: rotate(55deg);
                transform: rotate(90deg);
            }
        }
        .box1{
            background-color: cadetblue;
            top: 20vh;
            left: 20vw;
            width: 5vw;
            height: 5vw;
            padding: auto;
            text-align: center;
            font-family: cursive,'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
            animation: rotation 5s ease-in-out 1s 1 alternate;
        }
    </style>
</head>
<body>
     <div class="container">
        <div class="box">Box1</div>
        <div class="box1">Box</div>
     </div>
</body>
</html>
