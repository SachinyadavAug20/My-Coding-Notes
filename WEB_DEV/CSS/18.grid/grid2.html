<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grids-2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .container1 {
            border: 2px solid black;
            height: 60vh;
            padding: 5px;
            margin: 7px;
            border-radius: 10px;
            display: grid;
            grid-template-areas: "icon nav nav nav"
                "main main empty1 sidebar"
                "footer footer footer footer";
            gap: 10px 5px;
            justify-items: center;
            align-items: center;
        }

        .item {
            border: 2px solid rebeccapurple;
            width: 55px;
            padding: 4px;
            margin: 5px;
            height: 55px;
            /* width: 55px; */
        }

        .item1 {
            grid-area: nav;
            background-color: aqua;
            align-self: flex-start;
            justify-self: start;
        }

        .item2 {
            grid-area: main;
            background-color: rgb(121, 241, 241);
        }

        .item3 {
            grid-area: sidebar;
            background-color: rgb(1, 190, 190);
        }

        .item4 {
            grid-area: footer;
            background-color: rgb(160, 229, 229);
        }

        .item5 {
            grid-area: icon;
            background-color: rgb(90, 172, 172);
            align-self: flex-end;
        }

        .item6 {
            grid-area: nav;
            background-color: rgb(127, 229, 255);
            align-self: flex-end;
            justify-self: end;
        }
    </style>
</head>

<body>
    <div class="container1">
        <div class="item item1">1</div>
        <div class="item item2">2</div>
        <div class="item item3">3</div>
        <div class="item item4">4</div>
        <div class="item item5">5</div>
        <div class="item item6">6</div>
    </div>
</body>

</html>
