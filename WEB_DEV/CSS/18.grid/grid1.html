<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid-1</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .container1{
            border: 2px solid black;
            padding: 5px;
            margin: 5px;
            border-radius: 10px;
            display: grid;
            grid-template-columns: repeat(2,minmax(100px,1.125fr));
            grid-template-columns: [phela_c] 1fr [dosara_c] 1fr [tesara_c];
            grid-template-rows: [phela_r] 1fr [dosara_r] 1.125fr [tesara_r] 1fr [chauta_r];
            gap: 10px 10px;
            place-content: center;
        }
        .item{
            border: 2px solid rgb(255, 73, 73);
            padding: 5px;
            font-size: 20px;
            font-family: cursive,system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            font-weight: 800;
            border-radius: 8px;
            height: 55px;
            margin: 10px;
            
            /* width: 55px; */
        }
        .item4{
            /* grid-row-start: 1; */
            /* grid-row-end: 2; */
            /* OR  */
            grid-row: 1/2;
            grid-column: 1/2;
        }
        .item1{
            grid-row: 1/2;
            grid-column: 1/2;
        }
        .item3{
            grid-row: 2/3;
            /* grid-column: 1/3; */
            /* OR  */
            grid-column: phela_c/tesara_c;
        }
    </style>
</head>
<body>
    <div class="container1">
        <div class="item item1">1</div>
        <div class="item item2">2</div>
        <div class="item item3">3</div>
        <div class="item item4">4</div>
        <div class="item item5">5</div>
    </div>
</body>
</html>
