<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card in CSS</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background-color: #eaf0f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 20px;
    }

    header {
      border: 2px solid yellowgreen;
      border-radius: 10px;
      text-transform: uppercase;
      text-align: center;
      padding: 10px;
      margin-bottom: 20px;
    }

    .card_box {
      background: #fff;
      border-radius: 15px;
      width: 300px;
      box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      padding-bottom: 20px;
      text-align: left;
    }

    .cardimg {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-top-left-radius: 15px;
      border-top-right-radius: 15px;
    }

    .tags {
      display: flex;
      gap: 10px;
      padding: 10px 15px 0 15px;
    }

    .tage {
      background-color: #f0f4f8;
      color: #555;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
    }

    .card_heading {
      font-weight: bold;
      font-size: 20px;
      margin: 10px 15px;
      color: #222;
    }

    .card_discription {
      font-size: 14px;
      margin: 0 15px;
      color: #555;
      line-height: 1.5;
    }

    .readmore {
      display: inline-block;
      margin: 15px;
      padding: 10px 20px;
      background-color: #e8f1ff;
      color: #3366cc;
      border-radius: 25px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      transition: background 0.3s;
    }

    .readmore:hover {
      background-color: #d0e4ff;
    }

    .referrence img {
      margin-top: 20px;
      width: 300px;
      border: 2px dashed #ccc;
    }
  </style>
</head>
<body>
  <header>
    <h1>Random Cards</h1>
  </header>

  <main>
    <div class="card_box">
      <img class="cardimg" src="place.jpg" alt="California mountains">

      <div class="tags">
        <div class="tage">Nature</div>
        <div class="tage">Lake</div>
        <div class="tage">Mountains</div>
      </div>

      <div class="card_heading">California Mountain</div>
      <div class="card_discription">
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Quisquam explicabo eius odit esse. Cum quis eius delectus voluptatem!
      </div>

      <a target="_blank" class="readmore" href="https://youtube.com">Read more</a>
    </div>

    <span class="referrence"><img src="card.png" alt="card reference"></span>
  </main>
</body>
</html>
