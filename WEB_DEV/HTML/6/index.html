<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This is the discription of the element property to occupy the screen">
    <title>Inline and block element -HTML</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <p>i am a paragraph which contains nothing</p>
    <a target="_blank" href="https://google.com">Google</a>
    <div>I am div, block element</div>
    <span>I am span, inline element</span>
    <a target="_blank" href="https://youtube.com">Youtube</a>
    <form action="post">
        <h1>Residential detail Form</h1>
        <div>
            <label for="username">Enter  your name</label>
            <input type="text" name="Username" id="username" placeholder="Usrename">
        </div>
        <div>
            <label for="City">Choose your city</label>
            <input type="radio" name="City" id="Mumbai" value="Mumbai">
            <label for="Mumbai">Mumbai</label>
            <input type="radio" name="City" id="Delhi" value="Delhi">
            <label for="Delhi">Delhi</label>
            <input type="radio" name="City" id="Kolkata" value="Kolkata">
            <label for="Kolkata">Kolkata</label>
            <input type="radio" name="City" id="Pune" value="Pune">
            <label for="Pune">Pune</label>
            <input type="radio" name="City" id="Others" value="Others">
            <label for="Others">Others</label>

        </div>
        <div>
            <label for="pincode">Enter pincode</label>
            <input type="number" id="pincode" name="pincode" placeholder="123456">
        </div>
    </form>
</body>
</html>
