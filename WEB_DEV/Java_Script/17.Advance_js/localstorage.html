<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Storage</title>
</head>
<body>
        <script>
        //can store key value pairs in localStorage
            if(localStorage.getItem("name")!=null){
            }
            else{
            let n=prompt("Enter your name");
                localStorage.setItem("name",n);
            }
            document.write("Welcome, "+localStorage.getItem("name"));

        //to store an object in localStorage
        //stringify and the parse as can only store strings in localStorage
        let c={
            "harry":682,
            fall:true,
            winter:90,
            summer:"hot"
        }
        localStorage.setItem("Data",JSON.stringify(c));
        console.log(c);
        console.log(JSON.stringify(c))
        console.log(JSON.parse(localStorage.getItem("Data")));
        </script>
</body>
</html>
