<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java script Introduction</title>
</head>
<body>
    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
    </div>
    <div style="display: flex; flex-wrap: wrap;justify-content: center;margin: 5vw; gap: 2vw;">

        <button style="cursor: pointer;">Submit</button>
        <button style="cursor: progress;">Processing Infinity</button>
        <button style="cursor:alias;">Test1</button>
        <button style="cursor:all-scroll;">Test2</button>
        <button style="cursor:cell;">Test3</button>
        <button style="cursor:copy;">Test4</button>
        <button style="cursor:context-menu;">Test5</button>
        <button style="cursor:col-resize;">Test6</button>
        <button style="cursor:crosshair;">Test7</button>
        <button style="cursor:grab;">Test8</button>
        <button style="cursor:grabbing;">Test9</button>
        <button style="cursor:zoom-in;">Test10</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
