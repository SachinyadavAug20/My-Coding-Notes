<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM -Document Object Model</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .container{
            display: flex;
            flex-direction: row;
            gap: 10px;
        }
        .box{
            border: 2px solid;
            border-radius: 7.25px;
            margin: 10px;
            padding: 10px;
            font-family: cursive;
        }
    </style>
</head>
<body>
    <h1>Hello world</h1>
    <div class="container">
        <div class="box">Box1</div>
        <div class="box">Box2</div>
        <div class="box">Box3</div>
        <div class="box">Box4</div>
        <div class="box">Box5</div>
    </div>
    <table>
        <thead>Hii</thead>
        <caption>Words</caption>
        <tr>
            <th>Name</th>
            <th>place</th>
            <th>thing</th>
        </tr>
        <tr>
            <td>Alaska</td>
            <td>Alo</td>
            <td>Alou</td>
        </tr>
        <tr>
            <td>Gaff</td>
            <td>Gergia</td>
            <td>Gera</td>
        </tr>
        <tr>
            <td>Bale</td>
            <td>Bay</td>
            <td>Breed</td>
        </tr>
    </table>
    <script src="script.js"></script>
</body>
</html>
